services:
  redis:
    image: redis:latest
    ports:
      - "6379:6379" # Expose Redis port
    volumes:
      - redis-data:/data
  minio:
    image: minio/minio:latest
    ports:
      - "9000:9000" # Expose MinIO API port
      - "9001:9001" # Expose MinIO Console port
    environment:
      MINIO_ROOT_USER: $(OBJECT_STORAGE_ACCESS_KEY)
      MINIO_ROOT_PASSWORD: $(OBJECT_STORAGE_SECRET_KEY)
    command: server /data --console-address ":9001" # Start MinIO server with console on port 9001
    # Use a named volume to persist MinIO data
    volumes:
      - minio-data:/data

# Define named volumes for data persistence
volumes:
  redis-data:
  minio-data: